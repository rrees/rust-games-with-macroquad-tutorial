name: Build

on:
  push:
    branches:
      - main

permissions:
  content: write
  pages: write

jobs:
  build:
    runs_on: ubuntu_latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Install Rust
        uses: actions-rs/toolchain@v1:
          with:
            toolchain: stable
            target: wasm32-unknown-unknown
            override: true
      - name: Build
        run: cargo build --release --target wasm32-unknown-unknown
